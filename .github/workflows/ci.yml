name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build site
        run: npm run build

      - name: Check generated output is committed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated output is stale. Run 'npm run build' and commit the result."
            git status --porcelain
            git --no-pager diff
            exit 1
          fi

      - name: Validate site
        run: npm run validate
